{% extends "base.html" %}
{% block title %}
    PUFTER 編集ページ
{% endblock %}
{% block extra_links %}
<link rel="stylesheet" href="{{url_for('static', filename='css/pufter/pufter.css')}}">
{% endblock %}

{% block content %}
	<div id="sideBar1">
		<div id="avaiableEntitySelector"></div>
		<div id="player">
			<div id="media"></div>
			<input id="seekBar" type="range" max="100" min="0" step="1" value="0">
			<button id="currentPosition">再生位置</button>
		</div>
	</div>

	<div id="WebGL"></div>

  <div id="sideBar2">
    <div id="entitySelector"></div>
    <div id="entityParameters"></div>
  </div>
{% endblock %}
{% block extra_scripts %}
    <script src="{{ url_for('static', filename='js/pufter/main.js') }}" type="module"></script>
{% endblock %}
