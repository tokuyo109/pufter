{% extends "base.html" %}
{% block title %}
    編集ページ2
{% endblock %}

{% block extra_links %}
    <link rel="stylesheet" href="{{url_for('static', filename='css/new_editor/style.css')}}">
{% endblock %}

{% block content %}
    <div id="musicPlayer">
        <div>
            <input type="range" id="positionBar" min="0" max="100" value="0">
        </div>
        <div id="musicPlayerCol2">
            <input type="file" id="musicFile">
            <button id="playButton">再生</button>
            <button id="stopButton">停止</button>
            <input type="range" id="volumeBar" min="0" max="100" value="50">
        </div>
  </div>
{% endblock %}
{% block extra_scripts %}
    <script src="{{ url_for('static', filename='js/new_editor/main.js') }}" type="module"></script>
{% endblock %}
